---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-config-manager-yuno-org-v1-nodegroup
  failurePolicy: Fail
  name: mnodegroup-v1.kb.io
  rules:
  - apiGroups:
    - config-manager.yuno.org
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - nodegroups
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-config-manager-yuno-org-v1-nodegroup
  failurePolicy: Fail
  name: vnodegroup-v1.kb.io
  rules:
  - apiGroups:
    - config-manager.yuno.org
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - nodegroups
  sideEffects: None
